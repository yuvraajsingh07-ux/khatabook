kind = "web"
previewPath = "/"
title = "Khata - Payment Ledger"
version = "1.0.0"
id = "artifacts/khata-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25420

[services.development]
run = "pnpm --filter @workspace/khata-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/khata-app", "run", "build" ]
publicDir = "artifacts/khata-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25420"
BASE_PATH = "/"
